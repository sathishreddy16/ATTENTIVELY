services:
  - type: web
    name: chanting-coach-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -e . && mkdir -p bin && curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz | tar -xJ --strip-components=1 -C bin
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: STORAGE_BACKEND
        value: local
      - key: PRIMARY_SPEECH_PROVIDER
        value: deepgram
