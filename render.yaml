services:
  - type: web
    name: chanting-coach-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: STORAGE_BACKEND
        value: local
      - key: PRIMARY_SPEECH_PROVIDER
        value: deepgram
